<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>订单确认 - CloudBook 云书房</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/layout.css" />
</head>
<body>
    <div id="header"></div>

    <div class="main-content">
        <div class="container">
            <div class="breadcrumb">
                <a href="./index.html">首页</a>
                <span class="separator">/</span>
                <a href="./cart.html">购物车</a>
                <span class="separator">/</span>
                <span>订单确认</span>
            </div>

            <h1 class="page-title mb-3">确认订单</h1>

            <div class="panel">
                <div class="panel-title">收货信息</div>
                <form id="order-form">
                    <div class="flex" style="gap:16px;">
                        <div class="form-group" style="flex:1;">
                            <label>收货地址</label>
                            <input type="text" class="form-input" id="address" placeholder="请输入详细收货地址" />
                            <div class="form-error" id="address-error"></div>
                        </div>
                        <div class="form-group" style="flex:0 0 240px;">
                            <label>联系电话</label>
                            <input type="text" class="form-input" id="phone" placeholder="请输入11位手机号" />
                            <div class="form-error" id="phone-error"></div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="panel">
                <div class="panel-title">订单商品</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>图书</th>
                            <th>单价</th>
                            <th>数量</th>
                            <th>小计</th>
                        </tr>
                    </thead>
                    <tbody id="order-items">
                        <tr><td colspan="4" class="text-center text-muted">加载中...</td></tr>
                    </tbody>
                </table>

                <div class="flex-between mt-3">
                    <span class="text-muted">订单总额：</span>
                    <span class="font-bold" style="font-size:22px;color:#e74c3c;" id="order-total">¥0.00</span>
                </div>
            </div>

            <div class="text-right mt-3">
                <button class="btn btn-primary btn-lg" id="submit-order-btn" form="order-form">提交订单</button>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="./js/core/config.js"></script>
    <script src="./js/core/utils.js"></script>
    <script src="./js/core/api.js"></script>
    <script src="./js/modules/auth.js"></script>
    <script src="./js/modules/cart.js"></script>
    <script src="./js/modules/order.js"></script>
    <script src="./js/components/header.js"></script>
    <script src="./js/components/footer.js"></script>
    <script src="./js/components/modal.js"></script>
    <script src="./js/components/loading.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
