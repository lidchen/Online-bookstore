<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书详情 - CloudBook 云书房</title>
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <style>
        .detail-container {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 32px;
            display: flex;
            gap: 32px;
            border: 1px solid var(--border-light);
        }
        .detail-cover {
            flex-shrink: 0;
            width: 280px;
            height: 364px;
            border-radius: var(--radius);
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .detail-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-cover .cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            color: rgba(255,255,255,0.5);
        }
        .detail-info {
            flex: 1;
        }
        .detail-info h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .detail-info .detail-author {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .detail-info .detail-category {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 13px;
            margin-bottom: 16px;
        }
        .detail-info .detail-price {
            font-size: 32px;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 8px;
        }
        .detail-info .detail-stock {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .detail-info .detail-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius);
        }
        .detail-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .detail-actions .quantity-input {
            height: 44px;
        }
        .detail-actions .quantity-input button,
        .detail-actions .quantity-input input {
            height: 44px;
        }
        @media (max-width: 768px) {
            .detail-container {
                flex-direction: column;
                padding: 20px;
            }
            .detail-cover {
                width: 100%;
                max-width: 280px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="main-content">
        <div class="container">
            <div class="breadcrumb">
                <a href="/index.html">首页</a>
                <span class="separator">/</span>
                <span>图书详情</span>
            </div>

            <div id="detail-container">
                <div class="detail-container">
                    <div class="detail-cover" id="detail-cover">
                        <div class="cover-placeholder">📖</div>
                    </div>
                    <div class="detail-info">
                        <h1 id="detail-title">加载中...</h1>
                        <p class="detail-author" id="detail-author"></p>
                        <span class="detail-category" id="detail-category"></span>
                        <div class="detail-price" id="detail-price"></div>
                        <div class="detail-stock" id="detail-stock"></div>
                        <div class="detail-desc" id="detail-description"></div>
                        <div class="detail-actions">
                            <div class="quantity-input">
                                <button onclick="const i=document.getElementById('quantity');i.value=Math.max(1,parseInt(i.value||1)-1)">-</button>
                                <input type="number" id="quantity" value="1" min="1" />
                                <button onclick="const i=document.getElementById('quantity');i.value=parseInt(i.value||1)+1">+</button>
                            </div>
                            <button class="btn btn-primary btn-lg" id="add-cart-btn">加入购物车</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="/js/core/config.js"></script>
    <script src="/js/core/utils.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/modules/auth.js"></script>
    <script src="/js/modules/books.js"></script>
    <script src="/js/modules/cart.js"></script>
    <script src="/js/components/header.js"></script>
    <script src="/js/components/footer.js"></script>
    <script src="/js/components/modal.js"></script>
    <script src="/js/components/loading.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
