<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudBook 云书房 - 发现好书，阅读世界</title>
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/pages/home.css" />
</head>
<body>
    <div id="header"></div>

    <div class="home-banner">
        <div class="container">
            <h2>发现好书，阅读世界</h2>
            <p>海量图书资源，智能搜索推荐，让阅读成为生活的一部分</p>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <div class="page-layout">
                <aside class="sidebar">
                    <div class="sidebar-title">图书分类</div>
                    <div class="category-list">
                        <div class="category-item active" data-category-id="0">
                            <span class="cat-icon">📚</span> 全部分类
                        </div>
                        <div class="category-item" data-category-id="1">
                            <span class="cat-icon">📖</span> 文学
                        </div>
                        <div class="category-item" data-category-id="2">
                            <span class="cat-icon">💻</span> 科技
                        </div>
                        <div class="category-item" data-category-id="3">
                            <span class="cat-icon">🧒</span> 少儿
                        </div>
                        <div class="category-item" data-category-id="4">
                            <span class="cat-icon">🎓</span> 教育
                        </div>
                        <div class="category-item" data-category-id="5">
                            <span class="cat-icon">🌐</span> 网络文学
                        </div>
                    </div>
                </aside>

                <div class="content-area">
                    <div class="book-grid" id="book-list">
                        <div class="loading-inline" style="grid-column:1/-1;">加载中...</div>
                    </div>
                    <div id="pagination-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="/js/core/config.js"></script>
    <script src="/js/core/utils.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/modules/auth.js"></script>
    <script src="/js/modules/books.js"></script>
    <script src="/js/modules/cart.js"></script>
    <script src="/js/components/header.js"></script>
    <script src="/js/components/footer.js"></script>
    <script src="/js/components/pagination.js"></script>
    <script src="/js/components/modal.js"></script>
    <script src="/js/components/loading.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
