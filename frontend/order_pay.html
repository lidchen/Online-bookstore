<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模拟支付 - CloudBook 云书房</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <style>
        .pay-container {
            max-width: 480px;
            margin: 0 auto;
            text-align: center;
        }
        .pay-qrcode {
            width: 200px;
            height: 200px;
            margin: 0 auto 24px;
            background: var(--bg);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border: 2px dashed var(--border);
        }
        .pay-info {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 24px;
        }
        .pay-steps {
            text-align: left;
            margin-bottom: 24px;
        }
        .pay-steps .step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .pay-steps .step .step-num {
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="main-content">
        <div class="container">
            <div class="breadcrumb">
                <a href="./index.html">首页</a>
                <span class="separator">/</span>
                <a href="./my_orders.html">我的订单</a>
                <span class="separator">/</span>
                <span>模拟支付</span>
            </div>

            <div class="pay-container">
                <h1 class="page-title text-center mb-3">模拟支付</h1>

                <div class="panel">
                    <div class="pay-info">
                        <p class="text-muted">订单号</p>
                        <p class="font-bold" style="font-size:18px;" id="order-id">-</p>
                    </div>

                    <div class="pay-qrcode" id="qrcode">
                        📱
                    </div>

                    <p class="text-muted mb-3" style="font-size:13px;">请使用手机扫描二维码完成支付</p>

                    <div class="pay-steps">
                        <div class="step">
                            <span class="step-num">1</span>
                            打开手机支付App
                        </div>
                        <div class="step">
                            <span class="step-num">2</span>
                            扫描上方二维码
                        </div>
                        <div class="step">
                            <span class="step-num">3</span>
                            确认支付金额并完成支付
                        </div>
                        <div class="step">
                            <span class="step-num">4</span>
                            点击下方按钮确认
                        </div>
                    </div>

                    <button class="btn btn-primary btn-lg btn-block" id="pay-btn">我已支付，下一步</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="./js/core/config.js"></script>
    <script src="./js/core/utils.js"></script>
    <script src="./js/core/api.js"></script>
    <script src="./js/modules/auth.js"></script>
    <script src="./js/modules/order.js"></script>
    <script src="./js/components/header.js"></script>
    <script src="./js/components/footer.js"></script>
    <script src="./js/components/modal.js"></script>
    <script src="./js/components/loading.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
