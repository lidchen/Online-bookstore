<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 - CloudBook 云书房</title>
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/layout.css" />
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">📖</div>
                <h1>CloudBook 云书房</h1>
            </div>
            <p class="auth-subtitle">创建账号，开启阅读之旅</p>

            <form id="register-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="3-20个字符" autocomplete="username" />
                    <div class="form-error" id="username-error"></div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" class="form-input" id="password" placeholder="至少6个字符" autocomplete="new-password" />
                    <div class="form-error" id="password-error"></div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" class="form-input" id="confirm-password" placeholder="请再次输入密码" autocomplete="new-password" />
                    <div class="form-error" id="confirm-error"></div>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">注册</button>
            </form>

            <div class="auth-footer">
                已有账号？<a href="/login.html">立即登录</a>
            </div>
            <div class="auth-footer mt-1">
                <a href="/index.html">返回首页</a>
            </div>
        </div>
    </div>

    <script src="/js/core/config.js"></script>
    <script src="/js/core/utils.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/modules/auth.js"></script>
    <script src="/js/components/header.js"></script>
    <script src="/js/components/footer.js"></script>
    <script src="/js/components/modal.js"></script>
    <script src="/js/components/loading.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
